spring:
  application:
    name: kyofuse

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/kyofuse}
    username: ${DB_USERNAME:kyofuse}
    password: ${DB_PASSWORD:kyofuse}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
    ignoreIgnoredMigrations: true
    validateOnMigrate: false

  server:
    port: 8080