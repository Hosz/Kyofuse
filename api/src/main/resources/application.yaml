spring:
  application:
    name: kyofuse

  datasource:
    url: jdbc:postgresql://localhost:5432/kyofuse
    username: kyofuse
    password: kyofuse
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:kyofuse-local-development-secret-key-change-me-please-123456789}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}